[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "openagentpay"
version = "0.1.0a0"
description = "OpenAgentPay Python SDK — types and client for the open Agent Payments platform."
readme = "README.md"
license = { text = "Apache-2.0" }
authors = [{ name = "Neo Sun", email = "neosun100@github" }]
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.27.0",
    "pydantic>=2.7.0",
]
keywords = ["agentcore", "agent-payments", "ai-agent", "x402"]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=5.0.0",
    "ruff>=0.5.0",
    "mypy>=1.10.0",
]

[project.urls]
Homepage = "https://github.com/neosun100/openagentpay"
Repository = "https://github.com/neosun100/openagentpay"

[tool.hatch.build.targets.wheel]
packages = ["openagentpay"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "B", "UP", "ASYNC", "S", "RUF"]
ignore = ["S101"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
