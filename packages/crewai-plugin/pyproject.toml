[project]
name = "openagentpay-crewai"
version = "0.1.0a0"
description = "CrewAI Tool integration for OpenAgentPay — autonomous payments for crew workflows."
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
readme = "README.md"
dependencies = [
    "httpx>=0.27.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["openagentpay_crewai"]
