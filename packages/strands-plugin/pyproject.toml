[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "openagentpay-strands"
version = "0.1.0a0"
description = "OpenAgentPay Strands plugin — Strands-compatible payment tool backed by OpenAgentPay's pluggable wallet/protocol infrastructure."
readme = "README.md"
license = { text = "Apache-2.0" }
authors = [{ name = "Neo Sun", email = "neosun100@github" }]
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.27.0",
]
keywords = ["strands", "agentcore", "ai-agent", "payments", "x402"]

[project.optional-dependencies]
# Strands SDK is OPTIONAL — the tool works as a plain async function without it.
# Install the [strands] extra to get full Strands Agent integration.
strands = [
    "strands-agents>=0.1.0",
]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-mock>=3.12.0",
    "respx>=0.21.0",
    "ruff>=0.5.0",
]

[project.urls]
Homepage = "https://github.com/neosun100/openAgentPay"
Repository = "https://github.com/neosun100/openAgentPay"

[tool.hatch.build.targets.wheel]
packages = ["openagentpay_strands"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
