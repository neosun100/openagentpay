[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "openagentpay-strands"
version = "0.1.0a0"
description = "OpenAgentPay Strands Plugin — drop-in replacement for AgentCorePaymentsPlugin."
readme = "README.md"
license = { text = "Apache-2.0" }
authors = [{ name = "Neo Sun", email = "neosun100@github" }]
requires-python = ">=3.10"
dependencies = [
    "openagentpay",
    "strands-agents>=0.1.0",
    "httpx>=0.27.0",
]
keywords = ["strands", "agentcore", "ai-agent", "payments"]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "ruff>=0.5.0",
]

[tool.hatch.build.targets.wheel]
packages = ["openagentpay"]

[tool.uv.sources]
openagentpay = { workspace = true }

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
