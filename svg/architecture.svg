<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 920">
  <defs>
    <style>text{font-family:'SF Pro Display','Segoe UI',system-ui,-apple-system,sans-serif;font-weight:500}</style>
    <linearGradient id="grad-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4facfe"/>
      <stop offset="100%" stop-color="#00f2fe"/>
    </linearGradient>
    <linearGradient id="grad-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9a3c"/>
      <stop offset="100%" stop-color="#ff6a3c"/>
    </linearGradient>
    <linearGradient id="grad-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#11998e"/>
      <stop offset="100%" stop-color="#38ef7d"/>
    </linearGradient>
    <linearGradient id="grad-pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f093fb"/>
      <stop offset="100%" stop-color="#f5576c"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#a78bfa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="920" rx="16" fill="#0f172a"/>

  <!-- Title -->
  <text x="400" y="48" text-anchor="middle" font-size="22" font-weight="700" fill="#e2e8f0">OpenAgentPay Live Architecture</text>
  <text x="400" y="74" text-anchor="middle" font-size="13" fill="#94a3b8">on AWS · serving https://d1p7yxa99nxaye.cloudfront.net</text>

  <!-- ========== Layer 1: Browser (User) ========== -->
  <rect x="280" y="105" width="240" height="56" rx="10" fill="#1e293b" stroke="url(#grad-purple)" stroke-width="2"/>
  <text x="400" y="130" text-anchor="middle" font-size="14" font-weight="700" fill="#e2e8f0"> Browser</text>
  <text x="400" y="150" text-anchor="middle" font-size="11" fill="#94a3b8">user opens demo URL · React three-tab UI</text>

  <!-- arrow -->
  <line x1="400" y1="161" x2="400" y2="195" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <!-- ========== Layer 2: CloudFront ========== -->
  <rect x="180" y="200" width="440" height="100" rx="10" fill="#1e293b" stroke="url(#grad-blue)" stroke-width="2"/>
  <text x="400" y="225" text-anchor="middle" font-size="14" font-weight="700" fill="#7dd3fc"> CloudFront (Distribution E30J02EDDPMCS9)</text>
  <text x="400" y="244" text-anchor="middle" font-size="11" fill="#94a3b8">Global CDN · DDoS protection · TLS termination · CORS</text>

  <!-- Two routes inside CloudFront -->
  <rect x="200" y="258" width="180" height="32" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="290" y="278" text-anchor="middle" font-size="11" fill="#cbd5e1">default:  /*  →  S3 SPA</text>

  <rect x="420" y="258" width="180" height="32" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="510" y="278" text-anchor="middle" font-size="11" fill="#cbd5e1">behavior:  /api/*  →  API GW</text>

  <!-- two arrows down -->
  <line x1="290" y1="300" x2="290" y2="335" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="510" y1="300" x2="510" y2="335" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <!-- ========== Layer 3 left: S3 ========== -->
  <rect x="180" y="340" width="220" height="74" rx="10" fill="#1e293b" stroke="url(#grad-orange)" stroke-width="2"/>
  <text x="290" y="362" text-anchor="middle" font-size="13" font-weight="700" fill="#fdba74"> S3 + OAC</text>
  <text x="290" y="382" text-anchor="middle" font-size="10" fill="#94a3b8">apps/demo-web/dist (Vite build)</text>
  <text x="290" y="398" text-anchor="middle" font-size="10" fill="#94a3b8">private bucket · OAC SigV4 access</text>

  <!-- ========== Layer 3 right: API Gateway ========== -->
  <rect x="400" y="340" width="220" height="74" rx="10" fill="#1e293b" stroke="url(#grad-purple)" stroke-width="2"/>
  <text x="510" y="362" text-anchor="middle" font-size="13" font-weight="700" fill="#c4b5fd">⚡ API Gateway HTTP API</text>
  <text x="510" y="382" text-anchor="middle" font-size="10" fill="#94a3b8">awutdc0iaa.execute-api...</text>
  <text x="510" y="398" text-anchor="middle" font-size="10" fill="#94a3b8">$default stage · ANY /{proxy+}</text>

  <!-- arrow -->
  <line x1="510" y1="414" x2="510" y2="450" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <!-- ========== Layer 4: Lambda ========== -->
  <rect x="280" y="455" width="440" height="92" rx="10" fill="#1e293b" stroke="url(#grad-green)" stroke-width="2"/>
  <text x="500" y="480" text-anchor="middle" font-size="14" font-weight="700" fill="#86efac">λ Lambda · openagentpay-demo-api</text>
  <text x="500" y="500" text-anchor="middle" font-size="11" fill="#94a3b8">Node 20 · NodejsFunction (esbuild bundle, ESM)</text>
  <text x="500" y="518" text-anchor="middle" font-size="11" fill="#94a3b8">512MB · 30s timeout · routes /api/wallet · /session · /pay · /health</text>
  <text x="500" y="538" text-anchor="middle" font-size="10" fill="#cbd5e1" font-family="ui-monospace,Menlo">apps/demo-api/src/lambda.ts → handlers.ts</text>

  <!-- two side dependencies: Secrets + RPC -->
  <line x1="335" y1="547" x2="280" y2="600" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="4,3"/>
  <line x1="660" y1="547" x2="720" y2="600" stroke="#a5f3fc" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="4,3"/>
  <line x1="500" y1="547" x2="500" y2="600" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <!-- ========== Side: Secrets Manager ========== -->
  <rect x="60" y="605" width="220" height="60" rx="10" fill="#1e293b" stroke="url(#grad-orange)" stroke-width="2"/>
  <text x="170" y="628" text-anchor="middle" font-size="13" font-weight="700" fill="#fbbf24"> Secrets Manager</text>
  <text x="170" y="648" text-anchor="middle" font-size="10" fill="#94a3b8">KMS-encrypted private key</text>
  <text x="170" y="660" text-anchor="middle" font-size="9" fill="#64748b">IAM read scope to this Lambda only</text>

  <!-- ========== Side: HashKey RPC ========== -->
  <rect x="600" y="605" width="220" height="60" rx="10" fill="#1e293b" stroke="url(#grad-blue)" stroke-width="2"/>
  <text x="710" y="628" text-anchor="middle" font-size="13" font-weight="700" fill="#7dd3fc"> HashKey RPC</text>
  <text x="710" y="648" text-anchor="middle" font-size="10" fill="#94a3b8">testnet.hsk.xyz · chainId 133</text>
  <text x="710" y="660" text-anchor="middle" font-size="9" fill="#64748b">viem · EIP-712 sign + broadcast</text>

  <!-- ========== Layer 5: HashKey Chain Testnet (the on-chain layer) ========== -->
  <rect x="200" y="700" width="600" height="142" rx="12" fill="#1e293b" stroke="url(#grad-pink)" stroke-width="2"/>
  <text x="500" y="724" text-anchor="middle" font-size="14" font-weight="700" fill="#fda4af"> HashKey Chain Testnet (chainId 133) — settlement layer</text>

  <!-- inside: contract -->
  <rect x="220" y="740" width="280" height="40" rx="6" fill="#0f172a" stroke="#475569"/>
  <text x="360" y="757" text-anchor="middle" font-size="11" font-weight="700" fill="#fda4af"> MockUSDC contract</text>
  <text x="360" y="772" text-anchor="middle" font-size="9" fill="#94a3b8" font-family="ui-monospace,Menlo">0x0685C487Df4Cc0723Aa828C299686798294E9803</text>

  <!-- inside: protocol -->
  <rect x="510" y="740" width="270" height="40" rx="6" fill="#0f172a" stroke="#475569"/>
  <text x="645" y="757" text-anchor="middle" font-size="11" font-weight="700" fill="#fda4af">EIP-3009 transferWithAuthorization</text>
  <text x="645" y="772" text-anchor="middle" font-size="9" fill="#94a3b8">EIP-712 typed-data signature · facilitator settles</text>

  <!-- explorer link box -->
  <rect x="220" y="790" width="560" height="40" rx="6" fill="#0f172a" stroke="#475569"/>
  <text x="500" y="807" text-anchor="middle" font-size="11" fill="#cbd5e1"> every settlement is immutable + publicly verifiable on Blockscout</text>
  <text x="500" y="822" text-anchor="middle" font-size="9" fill="#64748b" font-family="ui-monospace,Menlo">https://testnet-explorer.hsk.xyz/tx/0x4562d26e... (block 27922490)</text>

  <!-- ========== Footer note ========== -->
  <rect x="60" y="868" width="320" height="40" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
  <text x="220" y="886" text-anchor="middle" font-size="11" font-weight="700" fill="#86efac">✓ Compliance</text>
  <text x="220" y="901" text-anchor="middle" font-size="9" fill="#94a3b8">no Function URL · IAM-scoped throughout · KMS at rest</text>

  <rect x="420" y="868" width="320" height="40" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="1"/>
  <text x="580" y="886" text-anchor="middle" font-size="11" font-weight="700" fill="#c4b5fd"> Cold-start ~1s · payment ~5s end-to-end</text>
  <text x="580" y="901" text-anchor="middle" font-size="9" fill="#94a3b8">357s CDK deploy · 4 verified on-chain txs · 82 tests pass</text>
</svg>
